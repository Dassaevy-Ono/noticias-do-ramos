<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login - Notícias do Ramos</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0d1b2a;
    font-family:Arial;
}

.card{

    width:350px;
    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

}

h1{
    text-align:center;
    margin-bottom:30px;
}

input{

    width:100%;
    padding:15px;

    margin-bottom:15px;

    border:1px solid #ddd;

    border-radius:10px;

}

button{

    width:100%;

    padding:15px;

    border:none;

    background:#ff3b30;

    color:white;

    border-radius:10px;

    cursor:pointer;

}

button:hover{
    opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<h1>📰 Notícias do Ramos</h1>

<form method="POST" action="/login">

<input
type="text"
name="usuario"
placeholder="Usuário"
required>

<input
type="password"
name="senha"
placeholder="Senha"
required>

<button>
Entrar
</button>

</form>

</div>

</body>
</html>
