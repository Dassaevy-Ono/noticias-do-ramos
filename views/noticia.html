<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Notícia | Notícias do Ramos</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        .container {
            width: calc(100% - 30px);
            max-width: 900px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .voltar {
            display: inline-block;
            margin-bottom: 25px;
            color: #0077b6;
            font-weight: bold;
            text-decoration: none;
        }

        .voltar:hover {
            text-decoration: underline;
        }

        .categoria {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 15px;
            color: white;
            background: #ff3b30;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 15px;
            font-size: 40px;
            line-height: 1.2;
        }

        .data {
            display: block;
            margin-bottom: 25px;
            color: #777;
            font-size: 14px;
        }

        .imagem-principal {
            width: 100%;
            max-height: 550px;
            margin: 10px 0 30px;
            object-fit: cover;
            border-radius: 10px;
        }

        .texto {
            color: #333;
            font-size: 18px;
            line-height: 1.8;
            overflow-wrap: anywhere;
        }

        .texto p {
            margin: 0 0 20px;
        }

        .texto h1,
        .texto h2,
        .texto h3 {
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .texto ul,
        .texto ol {
            margin-bottom: 20px;
            padding-left: 30px;
        }

        .texto img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .carregando,
        .erro {
            padding: 30px 0;
            text-align: center;
        }

        .erro {
            color: #b00020;
        }

        @media (max-width: 700px) {
            .container {
                margin: 20px auto;
                padding: 24px 18px;
                border-radius: 10px;
            }

            h1 {
                font-size: 30px;
            }

            .texto {
                font-size: 17px;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <a href="/" class="voltar">
            ← Voltar para o início
        </a>

        <div id="conteudo">
            <p class="carregando">
                Carregando notícia...
            </p>
        </div>
    </main>

    <script>
        function formatarData(data) {
            if (!data) {
                return "";
            }

            return new Date(data).toLocaleString(
                "pt-BR",
                {
                    dateStyle: "long",
                    timeStyle: "short"
                }
            );
        }

        async function carregarNoticia() {
            const conteudo =
                document.getElementById("conteudo");

            const partes =
                window.location.pathname
                    .split("/")
                    .filter(Boolean);

            const id = partes[1];
            const slugAtual = partes[2];

            if (!id) {
                conteudo.innerHTML = `
                    <div class="erro">
                        <h2>Notícia inválida</h2>
                        <p>O endereço informado não possui uma notícia válida.</p>
                    </div>
                `;

                return;
            }

            try {
                const resposta = await fetch(
                    `/api/noticias/${id}`
                );

                if (resposta.status === 404) {
                    conteudo.innerHTML = `
                        <div class="erro">
                            <h2>Notícia não encontrada</h2>
                            <p>Essa publicação pode ter sido removida.</p>
                        </div>
                    `;

                    return;
                }

                if (!resposta.ok) {
                    throw new Error(
                        "Não foi possível carregar a notícia."
                    );
                }

                const noticia = await resposta.json();

                if (
                    noticia.slug &&
                    slugAtual !== noticia.slug
                ) {
                    window.location.replace(
                        `/noticia/${noticia.id}/${noticia.slug}`
                    );

                    return;
                }

                document.title =
                    `${noticia.titulo} | Notícias do Ramos`;

                conteudo.innerHTML = `
                    <article>
                        <div class="categoria">
                            ${noticia.categoria}
                        </div>

                        <h1>
                            ${noticia.titulo}
                        </h1>

                        ${
                            noticia.created_at
                                ? `
                                    <time class="data">
                                        Publicado em
                                        ${formatarData(
                                            noticia.created_at
                                        )}
                                    </time>
                                `
                                : ""
                        }

                        ${
                            noticia.imagem
                                ? `
                                    <img
                                        src="${noticia.imagem}"
                                        alt="${noticia.titulo}"
                                        class="imagem-principal"
                                    >
                                `
                                : ""
                        }

                        <div class="texto">
                            ${noticia.texto}
                        </div>
                    </article>
                `;
            } catch (erro) {
                console.error(
                    "Erro ao carregar notícia:",
                    erro
                );

                conteudo.innerHTML = `
                    <div class="erro">
                        <h2>Erro ao carregar notícia</h2>
                        <p>
                            Tente atualizar a página em alguns instantes.
                        </p>
                    </div>
                `;
            }
        }

        carregarNoticia();
    </script>
</body>
</html>
